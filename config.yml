# Clearmail v2 Configuration
# Rules are written in plain English.

# Global rules — applied before per-category rules
# "keepIf" describes what should stay in your inbox
# "rejectIf" describes what should be moved out
globalRules:
  keepIf: |
    * Any vinted updates
    * Steam wishlist and sales notifications, or "now avaialble on steam" game launch announcements
    * anything about car or home insurance (quotes, renewals, policy documents, claims)
    * security alerts, one-time passwords, and login verification codes
    * direct personal replies to emails I've sent
    * transactional emails: receipts, shipping confirmations, invoices
    * account-related notices requiring action (password changes, billing issues)
    * calendar invitations and event reminders for events I registered for
  rejectIf: |
    * Anything political, campaign emails. 
    * mass marketing, promotional offers, discounts, and sale announcements
    * newsletters and weekly/monthly digests
    * unsolicited cold outreach and spam
    * social media notification digests

# Categories define how to label classified emails
# The LLM assigns exactly one category per email based on these rules
categories:
  - label: Financial
    keepIf: |
      * bank statements and transaction alerts
      * Anything eToro
      * Anything from my accountant
      * investment reports and portfolio updates
      * tax documents and receipts
      * payment confirmations from financial services
    rejectIf: |
      * promotional offers and marketing from financial institutions
      * credit card and loan offers

  - label: Job Opportunities
    keepIf: |
      * direct outreach from recruiters or hiring managers
      * personalized job offers and interview requests
      * messages from LinkedIn specifically to me
    rejectIf: |
      * job listing digests and weekly roundups
      * mass recruitment emails and job alerts

  - label: News
    keepIf: |
      * breaking news alerts I've explicitly subscribed to
      * personalized news digests from paid subscriptions
    rejectIf: |
      * generic news roundups and headlines from media outlets
      * blog post notifications

  - label: Social Updates
    keepIf: |
      * messages about opportunities to pay in bands and that kind of thing
    rejectIf: |
      * General facebook notifications, friend suggestions etc. 
      * social media digest emails and suggested content
      * trending topic summaries

  - label: Marketing
    keepIf: |
      * Notifications about AI and SaaS products i use. Sanity. Anthropic, Gemini, OpenAI, etc.
      * Anything Github
      * Steam wishlist or game launch announcements
      * eBay saved search alerts
      * product updates for services I actively use
    rejectIf: |
      * cold marketing and promotional emails
      * affiliate deals and sponsored content

# Deterministic pre-filters — bypass the LLM entirely
# Whitelist takes priority over blacklist (if an email matches both)
# Supports exact addresses and domain wildcards (*@example.com)
whitelist:
  - "judith.north@gmail.com"
  - "*@medicodigital.co.uk"
  - "johunter@gmail.com"
  - "pricealert@keepa.com"
  - "*@vclvintners.london"

blacklist:
  - "no-reply@spammy-newsletters.com"
  - "*@unwanted-domain.com"
  - "*@mail.promotions.example.net"

# LLM provider settings (OpenAI-compatible)
# Values here override .env defaults — leave commented to use .env values
provider:
  # baseURL: https://api.deepseek.com/v1
  # model: deepseek-chat
  # apiKey: ""       # Override .env value
  maxTokens: 500     # Max body characters sent to the LLM

# Behavior settings
behavior:
  pollIntervalSeconds: 120
  maxEmailChars: 750        # Max characters of email body sent to LLM
  maxEmailsPerBatch: 50     # Max emails to process in one polling cycle
  dryRun: false             # Log actions without modifying emails
  markRejectedRead: true    # Mark rejected emails as read
  starKept: true            # Star emails that are kept in inbox
  rejectedLabel: AI Rejects # Label/folder for rejected emails
  unknownLabel: CATEGORY_UNKNOWN  # Fallback label when LLM can't classify
  deepBreathSuffix: false   # Enable the silly but effective prompt suffix

# Logging
logging:
  level: info       # debug, info, warn, error
  format: plain     # plain or json

# Debug HTTP endpoint (for testing rule changes)
server:
  enabled: false
  port: 3003
  apiKey: ""        # Leave empty to disable the endpoint entirely
